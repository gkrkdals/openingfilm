name: CI/CD Docker Deploy

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  # 이미지명을 소문자로 생성하기 위해 github.repository를 소문자로 변환해 사용합니다.
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ meta.outputs.tags }}
          labels: ${{ meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "docker-compose.yml"
          target: "/var/www/openingfilm/"

      - name: Deploy to Rocky Linux via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /var/www/openingfilm

            # GitHub Container Registry 로그인용 토큰 임시 기록 및 로그인
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 환경 변수 .env 업데이트 실행 (Prisma 및 어드민 세션 인증 정보 기재)
            echo "DATABASE_URL=file:./data/dev.db" > .env
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
            echo "ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}" >> .env
            echo "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}" >> .env
            
            # GITHUB_REPOSITORY_OWNER 환경 변수 설정하여 이미지 다운로드 경로 맞춤
            export GITHUB_REPOSITORY_OWNER=${{ github.repository_owner }}

            # 새로운 이미지 다운로드 및 가동
            # docker-compose.yml이 배포 디렉토리에 존재해야 합니다.
            # (만약 파일 유실을 대비해 github actions에서 scp 등으로 보낼 수도 있습니다)
            docker compose pull
            docker compose up -d

            # 오래된 미사용 도커 이미지 정리
            docker image prune -f
